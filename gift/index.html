<!DOCTYPE html>
<html>
<head>
  <title>VIP Gift Redemption</title>
</head>
<body>

<h1>Your VIP Gift is Ready</h1>
<p>Please fill in your delivery details.</p>

<form name="gift_redemption" method="POST" data-netlify="true" action="/vip system/success/">
  <input type="hidden" name="form-name" value="gift_redemption">

  <input name="full_name" placeholder="Full Name" required><br><br>
  <input name="country_code" placeholder="Country Code" required><br><br>
  <input name="phone_number" placeholder="Phone Number" required><br><br>
  <input name="country" placeholder="Country" required><br><br>
  <input name="state" placeholder="State" required><br><br>
  <input name="city" placeholder="City" required><br><br>
  <input name="street_address" placeholder="Street Address" required><br><br>
  <input name="postal_code" placeholder="Postal Code" required><br><br>
  <input name="email" type="email" placeholder="Email" required><br><br>
  <textarea name="feedback_message" placeholder="Feedback Message"></textarea><br><br>

  <button type="submit">Submit</button>
</form>

</body>
</html>
