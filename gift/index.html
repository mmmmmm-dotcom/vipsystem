<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP Gift Redemption</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #d1d5db;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 34px;
      line-height: 1.15;
      margin: 0 0 12px;
      letter-spacing: -0.5px;
    }

    p {
      margin: 0 0 24px;
      color: #a7b0c0;
      font-size: 16px;
      line-height: 1.5;
    }

    input, textarea {
      width: 100%;
      padding: 15px 16px;
      margin-bottom: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #1f2937;
      color: white;
      font-size: 15px;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9ca3af;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #22c55e);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .success {
      display: none;
      text-align: center;
    }

    .success h1 {
      font-size: 32px;
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="card" id="formCard">
    <div class="badge">BK8 VIP Private Reward</div>

    <h1 id="title">🎁 Your VIP Gift is Ready</h1>
    <p id="subtitle">Please confirm your delivery details below.</p>

    <form name="gift_redemption" method="POST" data-netlify="true" id="giftForm">
      <input type="hidden" name="form-name" value="gift_redemption">

      <input type="hidden" name="vip_name" id="vip_name">
      <input type="hidden" name="gift_name" id="gift_name">
      <input type="hidden" name="vip_code" id="vip_code">
      <input type="hidden" name="kam_owner" id="kam_owner">
      <input type="hidden" name="campaign_month" id="campaign_month">

      <input name="full_name" placeholder="Full Name" required>
      <input name="country_code" placeholder="Country Code, e.g. +60" required>
      <input name="phone_number" placeholder="Phone Number" required>
      <input name="country" placeholder="Country" required>
      <input name="state" placeholder="State" required>
      <input name="city" placeholder="City" required>
      <input name="street_address" placeholder="Street Address" required>
      <input name="postal_code" placeholder="Postal Code" required>
      <input name="email" type="email" placeholder="Email" required>
      <textarea name="feedback_message" placeholder="Message / delivery note (optional)"></textarea>

      <button type="submit">Confirm Delivery Details</button>
    </form>

    <div class="small">Your details will be used only for this VIP gift arrangement.</div>
  </div>

  <div class="card success" id="successCard">
    <h1>✅ Submission Received</h1>
    <p>Thank you. Our VIP team will proceed with the arrangement shortly.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const name = params.get("name") || "";
    const gift = params.get("gift") || "";
    const vip = params.get("vip") || "";
    const kam = params.get("kam") || "";
    const month = params.get("month") || "";

    document.getElementById("vip_name").value = name;
    document.getElementById("gift_name").value = gift;
    document.getElementById("vip_code").value = vip;
    document.getElementById("kam_owner").value = kam;
    document.getElementById("campaign_month").value = month;

    if (name || gift) {
      document.getElementById("title").textContent =
        "🎁 Dear " + (name || "VIP") + ", your " + (gift || "VIP gift") + " is ready";

      document.getElementById("subtitle").textContent =
        "Please confirm your delivery details below so our team can proceed.";
    }

    const form = document.getElementById("giftForm");
    const formCard = document.getElementById("formCard");
    const successCard = document.getElementById("successCard");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const formData = new FormData(form);

      fetch("/", {
        method: "POST",
        body: formData
      })
      .then(function() {
        formCard.style.display = "none";
        successCard.style.display = "block";
      })
      .catch(function() {
        alert("Submission failed. Please try again.");
      });
    });
  </script>

</body>
</html>
